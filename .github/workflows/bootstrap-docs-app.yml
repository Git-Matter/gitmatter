name: Bootstrap docs app

# One-shot helper to create the dokploy docs Application from CI (the runner
# already holds the staging dokploy secrets and reaches the panel over Tailscale,
# so no credential leaves the trusted boundary). Runs only when a dev push commit
# message contains the marker [bootstrap-docs]. Phase 1 just inspects the existing
# project so we can wire the create correctly; it prints ids and image names
# (non-secret) only — never env values or registry passwords.
on:
  push:
    branches: [dev]

jobs:
  bootstrap:
    if: contains(github.event.head_commit.message, '[bootstrap-docs]')
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Inspect dokploy applications
        env:
          DOKPLOY_URL: ${{ secrets.STAGING_DOKPLOY_URL }}
          DOKPLOY_API_KEY: ${{ secrets.STAGING_DOKPLOY_API_KEY }}
        run: |
          set -euo pipefail
          one() { curl -fsSL "$DOKPLOY_URL/api/application.one?applicationId=$1" -H "x-api-key: $DOKPLOY_API_KEY"; }
          dom() { curl -fsSL "$DOKPLOY_URL/api/domain.byApplicationId?applicationId=$1" -H "x-api-key: $DOKPLOY_API_KEY"; }
          for id in C2-GkWV2esi_sOdrg0nGJ FOI6NznOTFVqT-e4-1N9S kv_-YBkv-sJR8o5kYpK2U; do
            A=$(one "$id")
            echo "::group::app $id"
            echo "$A" | jq -r '"name=\(.name)\tappName=\(.appName)\tenv=\(.environmentId)\tsrv=\(.serverId)\tsourceType=\(.sourceType)\timg=\(.dockerImage)\treg=\(.registryUrl)\tuser?=\(.username!=null and .username!="")\tpass?=\(.password!=null and .password!="")\tport=\(.ports)"'
            echo "-- domains --"
            dom "$id" | jq -r '.[]? | "host=\(.host)\tpath=\(.path)\tport=\(.port)\thttps=\(.https)\tcert=\(.certificateType)\tstrip=\(.stripPath)\tdomainType=\(.domainType)"'
            echo "::endgroup::"
          done
